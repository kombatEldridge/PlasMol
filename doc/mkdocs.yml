site_name: PlasMol Documentation
site_description: Hybrid FDTD–RTTDDFT framework for plasmon-molecule interactions
site_author: Brinton King Eldridge
repo_url: https://github.com/kombatEldridge/PlasMol
edit_uri: edit/main/doc/docs/

theme:
  name: mkdocs-material
  color_mode: auto
  user_color_mode_toggle: true
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate

nav:
  - Home: index.md
  - Getting Started:
    - About: about.md
    - Installation: installation.md
    - Usage: usage.md
    - Tutorials: tutorials.md
  - Advanced:
    - Theory & Methodology: methodology.md
  - Community:
    - Contributing: contributing.md
    - Custom Drivers: custom_drivers.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true  # Allows generic $...$ delimiters
  - tables
  - attr_list

plugins:
  - search

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js  # MathJax CDN for LaTeX